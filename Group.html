<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>440x956 比例縮放版</title>
  <style>
    /* 強制鎖定視窗，防止出現白邊 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000; /* 外部背景黑色 */
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start; /* 從頂部開始對齊 */
    }

    /* 這是你的 440x956 畫布 */
    #main-canvas {
      width: 440px;
      height: 956px;
      background: #212121;
      position: relative;
      flex-shrink: 0; /* 防止被壓縮 */
      transform-origin: top center; /* 以頂部中間為縮放支點 */
    }

    /* --- 以下是你原始的 CSS 樣式 --- */
    * {
      font-family: 'SE Pro', 'Inter', sans-serif !important;
      text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
    }

    .top-card {
      position: absolute; width: 440px; height: 145px; left: 0; top: 0;
      background: rgba(53,53,53,0.18); backdrop-filter: blur(2px);
      border-bottom: 1px solid rgba(255,255,255,0.28);
    }

    .avatar {
      position: absolute; width: 60px; height: 60px; left: 190px; top: 60px;
      background: url('https://raw.githubusercontent.com/liug1217/Group/682c1e79d519a3ce8ea245a2b0f9120ddce9fe28/S__3588120.jpg');
      background-size: cover; border-radius: 30px; z-index: 5;
    }

    .group-title {
      position: absolute; width: 113px; height: 15px; left: 163px; top: 120px;
      font-size: 12px; line-height: 15px; color: #FFFFFF; text-align: center; z-index: 5;
    }

    .rect-13 {
      position: absolute; width: 400px; height: 150px; left: 20px; top: 165px;
      background: rgba(53,53,53,0.18); border: 1px solid rgba(255,255,255,0.22); border-radius: 35px;
    }

    .big-avatar-2 {
      position: absolute; width: 100px; height: 100px; left: 30px; top: 190px;
      background: url('https://raw.githubusercontent.com/liug1217/Group/682c1e79d519a3ce8ea245a2b0f9120ddce9fe28/S__14131250.jpg');
      background-size: cover; border-radius: 50px; z-index: 10;
    }

    .u1_name { position: absolute; left: 150px; top: 202px; font-size: 12px; color: #FFF; }
    .u1_id { position: absolute; left: 150px; top: 215px; font-size: 15px; color: #FFF; }
    .u1_level_label { position: absolute; left: 150px; top: 233px; font-size: 12px; color: #FFF; }
    .u1_level { position: absolute; left: 150px; top: 248px; font-size: 12px; color: #FFF; }

    .rect-14 {
      position: absolute; width: 150px; height: 76px; left: 260px; top: 219px;
      background: rgba(53,53,53,0.18); border: 1px solid rgba(255,255,255,0.22); border-radius: 10px;
    }

    .rect-2 {
      position: absolute; width: 400px; height: 406px; left: 20px; top: 340px;
      background: rgba(53,53,53,0.18); border: 1px solid rgba(255,255,255,0.22); border-radius: 35px;
    }

    .rect-12 {
      position: absolute; width: 440px; height: 120px; left: 0px; top: 836px;
      background: rgba(53,53,53,0.18); border-top: 1px solid rgba(255,255,255,0.28);
    }

    /* 排行榜文字等物件... (此處省略部分重複樣式以節省篇幅) */
    .title-rank { position: absolute; left: 190px; top: 355px; font-size: 20px; color: #FFF; }
  </style>
</head>
<body>

  <div id="main-canvas">
    <div class="top-card"></div>
    <div class="avatar"></div>
    <div class="group-title">★Bi_藍冰團(Roblox)</div>
    
    <div class="rect-13"></div>
    <div class="big-avatar-2"></div>
    <div class="u1_name">劉 O 佑</div>
    <div class="u1_id">Bi_liug1217</div>
    <div class="u1_level_label">Roblox競爭者等級</div>
    <div class="u1_level">80</div>
    
    <div class="rect-14"></div>
    <div class="rect-2"></div>
    <div class="title-rank">排名表</div>
    
    <div class="rect-12"></div>
  </div>

  <script>
    function rescale() {
      const canvas = document.getElementById('main-canvas');
      const screenWidth = window.innerWidth;
      const screenHeight = window.innerHeight;
      
      // 計算縮放比例 (以寬度優先，確保畫面不被切掉)
      let scale = screenWidth / 440;
      
      // 如果縮放後高度太高，則改以高度為準 (可選)
      // if (956 * scale > screenHeight) { scale = screenHeight / 956; }
      
      canvas.style.transform = `scale(${scale})`;
    }

    // 初始執行一次
    rescale();
    // 視窗大小改變時重新計算
    window.addEventListener('resize', rescale);
  </script>
</body>
</html>
