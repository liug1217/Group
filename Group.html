<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>APP Editor Workspace</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #212121;
      overflow: hidden;
    }

    /* 全螢幕APP容器 */
    .app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* Rectangle 1 */
    .rect1 {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 811px;
      background: rgba(53, 53, 53, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
    }

    /* Rectangle 2 */

    /* Rectangle 12 */
    .rect12 {
      position: absolute;
      top: 836px;
      left: 0px;
      right: 0px;
      bottom: 0px;
      background: rgba(53, 53, 53, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="rect1"></div>
    <div class="rect2"></div>
    <div class="rect12"></div>
  </div>

</body>
</html>
