<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#212121" />

  <title>手機APP框架 - 最終修正版</title>

  <style>
    /* =========================
       1. 基礎布局：確保所有縫隙都是黑色
    ========================= */
    html {
      margin: 0;
      padding: 0;
      background-color: #212121; /* 這是消滅白邊的最強防線 */
      height: 100svh;
      width: 100%;
      overflow: hidden;
      position: fixed; 
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center; /* 讓 App 在畫面中央縮放 */
      flex-direction: column;
      height: 100svh;
      width: 100%;
      background-color: #212121;
      overscroll-behavior-y: none;
      overflow: hidden;
    }

    /* =========================
       2. 縮放容器：精確適配所有螢幕
    ========================= */
    .scale-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      /* 根據 100svh 動態縮放，防止網址列出現時內容溢出 */
      transform: scale(calc(min(100vw / 440, 100svh / 956)));
      transform-origin: center center;
    }

    .app {
      width: 440px;
      height: 956px;
      background: #212121;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* =========================
       3. Header（頂部元件）
    ========================= */
    .header {
      position: absolute;
      width: 440px;
      height: 145px;
      left: 0;
      top: 0;
      background: rgba(53, 53, 53, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      z-index: 10;
    }

    /* 主畫面模式下，微調頂部高度避開時間/電量 */
    @media (display-mode: standalone) {
      .header {
        height: 165px;
        padding-top: 20px;
      }
    }

    /* =========================
       4. UI 內容區塊（完整保留你的組件）
    ========================= */
    .rect13 {
      position: absolute;
      width: 400px;
      height: 150px;
      left: 20px;
      top: 165px;
      background: rgba(65, 65, 65, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 35px;
    }

    .rect2 {
      position: absolute;
      width: 400px;
      height: 406px;
      left: 20px;
      top: 340px;
      background: rgba(65, 65, 65, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 35px;
    }

    .rect4 {
      position: absolute;
      width: 400px;
      height: 50px;
      left: 20px;
      top: 340px;
      background: rgba(53, 53, 53, 0.2);
      border-bottom: 1px solid #838383;
      border-radius: 35px 35px 0 0;
      box-sizing: border-box;
    }

    .rect14 {
      position: absolute;
      width: 150px;
      height: 76px;
      left: 260px;
      top: 219px;
      background: rgba(99, 99, 99, 0.2);
      border-radius: 10px;
    }

    /* =========================
       5. Footer（解決你圖中紅框空白的關鍵）
    ========================= */
    .footer-nav {
      position: absolute;
      width: 440px;
      height: 120px;
      left: 0;
      /* 重要：改用 bottom: 0，確保它永遠鎖死在容器最底端 */
      bottom: 0; 
      background: rgba(53, 53, 53, 0.4);
      box-shadow: 0px -2px 10px rgba(0, 0, 0, 0.3);
    }

    /* 當在主畫面模式時，增加底部高度來填補 Home 條空間 */
    @media (display-mode: standalone) {
      .app {
        /* 在主畫面稍微拉高畫布，消除物理縫隙 */
        height: 1000px; 
      }
      .footer-nav {
        height: 164px; /* 增加的高度會填滿安全區 */
        padding-bottom: 30px; /* 讓內容稍微往上提一點，視覺更平衡 */
      }
    }

  </style>
</head>
<body>

<div class="scale-wrapper">
  <div class="app">
    <div class="header"></div>
    
    <div class="rect13"></div>
    <div class="rect14"></div>
    <div class="rect2"></div>
    <div class="rect4"></div>
    
    <div class="footer-nav"></div>
  </div>
</div>

</body>
</html>
