<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Group</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #212121;
  overflow: hidden;
}

/* APP */
.app {
  position: relative;
  width: 100%;
  height: 100%;
  background: #212121;
}

/* Rectangle 1 */
.rect1 {
  position: absolute;
  width: 100%;
  height: 145px;
  left: 0;
  top: 0;
  background: rgba(53, 53, 53, 0.2);
  box-shadow: 0px 4px 4px rgba(0,0,0,0.25);
}

/* S__3588120 1 */
.img1 {
  position: absolute;
  width: 60px;
  height: 60px;
  left: 50%;
  top: 60px;
  transform: translateX(-50%);
  background: url('https://raw.githubusercontent.com/liug1217/Group/161206efe056e444863f682dae5d32f173c86dfd/S__3588120.jpg') center/cover no-repeat;
  box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
  border-radius: 30px;
}

/* S__14131250 2 */
.img2 {
  position: absolute;
  width: 100px;
  height: 100px;
  left: 30px;
  top: 194px;
  background: url('https://raw.githubusercontent.com/liug1217/Group/161206efe056e444863f682dae5d32f173c86dfd/S__14131250.jpg') center/cover no-repeat;
  box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
  border-radius: 50px;
}

/* small icons */
.icon {
  position: absolute;
  width: 35px;
  height: 35px;
  left: 30px;
  box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
  border-radius: 17.5px;
  background-size: cover;
  background-position: center;
}

.icon1 { top: 401px; background-image: url('https://raw.githubusercontent.com/liug1217/Group/161206efe056e444863f682dae5d32f173c86dfd/S__14131210.jpg'); }
.icon2 { top: 452px; background-image: url('https://raw.githubusercontent.com/liug1217/Group/161206efe056e444863f682dae5d32f173c86dfd/S__14131235.jpg'); }
.icon3 { top: 503px; background-image: url('https://raw.githubusercontent.com/liug1217/Group/161206efe056e444863f682dae5d32f173c86dfd/S__14131250.jpg'); }
.icon4 { top: 554px; background-image: url('https://raw.githubusercontent.com/liug1217/Group/161206efe056e444863f682dae5d32f173c86dfd/S__14131251.jpg'); }
.icon5 { top: 605px; background-image: url('https://raw.githubusercontent.com/liug1217/Group/161206efe056e444863f682dae5d32f173c86dfd/S__14131253.jpg'); }
.icon6 { top: 657px; background-image: url('https://raw.githubusercontent.com/liug1217/Group/161206efe056e444863f682dae5d32f173c86dfd/S__14131255.jpg'); }
.icon7 { top: 707px; background-image: url('https://raw.githubusercontent.com/liug1217/Group/161206efe056e444863f682dae5d32f173c86dfd/S__14131240.jpg'); }

/* Rectangle 13 (container) */
.rect13 {
  position: absolute;
  width: calc(100% - 40px);
  height: 150px;
  left: 20px;
  top: 169px;
  background: rgba(65, 65, 65, 0.2);
  box-shadow: 0px 4px 4px rgba(0,0,0,0.25);
  border-radius: 35px;
  overflow: hidden;
}

/* Rectangle 14 */
.rect14 {
  position: absolute;
  width: 40%;
  max-width: 150px;
  height: 76px;
  right: 20px;
  top: 20px;
  background: rgba(99, 99, 99, 0.2);
  box-shadow: 0px 4px 4px rgba(0,0,0,0.25);
  border-radius: 10px;
}

/* Rectangle 2 */
.rect2 {
  position: absolute;
  width: calc(100% - 40px);
  height: 406px;
  left: 20px;
  top: 343px;
  background: rgba(65, 65, 65, 0.2);
  box-shadow: 0px 4px 4px rgba(0,0,0,0.25);
  border-radius: 35px;
}

/* Rectangle 4 */
.rect4 {
  position: absolute;
  width: calc(100% - 40px);
  height: 50px;
  left: 20px;
  top: 343px;
  background: rgba(53, 53, 53, 0.2);
  border-bottom: 1px solid #838383;
  box-shadow: 0px 4px 4px rgba(0,0,0,0.25);
  border-radius: 35px 35px 0 0;
}

/* Rectangle 12 */
.rect12 {
  position: absolute;
  width: 100%;
  height: 120px;
  left: 0;
  bottom: 0;
  background: rgba(53, 53, 53, 0.2);
  box-shadow: 0px 4px 4px rgba(0,0,0,0.25);
}

</style>
</head>
<body>

<div class="app">
  <div class="rect1"></div>
  <div class="img1"></div>
  <div class="img2"></div>

  <div class="icon icon1"></div>
  <div class="icon icon2"></div>
  <div class="icon icon3"></div>
  <div class="icon icon4"></div>
  <div class="icon icon5"></div>
  <div class="icon icon6"></div>
  <div class="icon icon7"></div>

  <div class="rect13">
    <div class="rect14"></div>
  </div>

  <div class="rect2"></div>
  <div class="rect4"></div>
  <div class="rect12"></div>
</div>

</body>
</html>
