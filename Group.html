<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: rgba(53, 53, 53, 0.2);
    }
    .wrapper {
      position: relative;
      width: 100%;
      min-height: 100vh;
      box-sizing: border-box;
      padding: 20px;
      background: #212121;
    }
    .rectangle1 {
      position: absolute;
      left: 0;
      right: 0;
      height: 85px;
      top: 0;
      background: rgba(53, 53, 53, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
    }
    .rectangle13 {
      position: absolute;
      left: 20px;
      right: 20px;
      height: 150px;
      top: 109px;
      background: rgba(65, 65, 65, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 35px;
    }
    .rectangle2 {
      position: absolute;
      left: 20px;
      right: 20px;
      height: 406px;
      top: 283px;
      background: rgba(65, 65, 65, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 35px;
    }
    .rectangle4 {
      box-sizing: border-box;
      position: absolute;
      left: 20px;
      right: 20px;
      height: 50px;
      top: 283px;
      background: rgba(53, 53, 53, 0.2);
      border-bottom: 1px solid #838383;
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 35px 35px 0px 0px;
    }
    .rectangle14 {
      position: absolute;
      left: 260px;
      right: 30px;
      height: 76px;
      top: 163px;
      background: rgba(99, 99, 99, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 10px;
    }
    .title-bi {
      position: absolute;
      width: 141px;
      height: 15px;
      left: 50%;
      transform: translateX(-50%);
      top: 62px;
      font-family: 'Inter', sans-serif;
      font-style: normal;
      font-weight: 400;
      font-size: 12px;
      line-height: 15px;
      text-align: center;
      color: #FFFFFF;
      text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
    }
    .avatar-s {
      position: absolute;
      width: 60px;
      height: 60px;
      left: 50%;
      transform: translateX(-50%);
      top: 0;
      background: url(https://raw.githubusercontent.com/liug1217/Group/bf1d66b2928638fa9a70f222da17f8243145da46/S__3588120.jpg);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 30px;
      background-size: cover;
      background-position: center;
    }
    .rectangle12 {
      position: absolute;
      left: 0;
      right: 0;
      height: 120px;
      bottom: 0;
      background: rgba(53, 53, 53, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
    }
    /* Rectangle 15 */
    .rectangle15 {
      position: absolute;
      left: 370px;
      right: 20px;
      height: 20px;
      top: 59px;
      background: rgba(217, 217, 217, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="rectangle1"></div>
    <div class="rectangle13"></div>
    <div class="rectangle2"></div>
    <div class="rectangle4"></div>
    <div class="rectangle14"></div>
    <div class="rectangle15"></div>
    <div class="avatar-s"></div>
    <div class="title-bi">★Bi_藍冰團★《Roblox》</div>
    <div class="rectangle12"></div>
  </div>
</body>
</html>
