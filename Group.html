<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />

  <!-- iOS / PWA 全螢幕 -->
  <meta name="viewport" content="width=device-width, initial-scale=1, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#212121" />

  <title>手機APP框架</title>

  <style>
    /* =========================
       基礎布局（修正 Safari 空白核心）
    ========================= */

    html {
      margin: 0;
      padding: 0;
      background-color: #212121;
      height: 100svh;
      overflow: hidden;
    }

    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      height: 100svh;
      background-color: #212121;
      overscroll-behavior-y: none;
      overflow: hidden;
    }

    /* 主容器：不再重複計算 safe-area（避免底部空白） */
    .scale-wrapper {
      transform-origin: center;
      transform: scale(calc(min(100vw / 440, 100svh / 956)));
    }

    .app {
      width: 440px;
      height: 956px;
      background: #212121;
      position: relative;
      overflow: hidden;
    }

    /* =========================
       Header（Rect 1）
    ========================= */
    .header {
      position: absolute;
      width: 440px;
      height: 145px;
      left: 0;
      top: 0;
      background: rgba(53, 53, 53, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
    }

    /* =========================
       UI 區塊
    ========================= */
    .rect13 {
      position: absolute;
      width: 400px;
      height: 150px;
      left: 20px;
      top: 165px;
      background: rgba(65, 65, 65, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 35px;
    }

    .rect2 {
      position: absolute;
      width: 400px;
      height: 406px;
      left: 20px;
      top: 340px;
      background: rgba(65, 65, 65, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 35px;
    }

    .rect4 {
      position: absolute;
      width: 400px;
      height: 50px;
      left: 20px;
      top: 340px;
      background: rgba(53, 53, 53, 0.2);
      border-bottom: 1px solid #838383;
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 35px 35px 0 0;
      box-sizing: border-box;
    }

    .rect14 {
      position: absolute;
      width: 150px;
      height: 76px;
      left: 260px;
      top: 219px;
      background: rgba(99, 99, 99, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 10px;
    }

    /* =========================
       Footer（Rect 12）修正重點
       → 避免 Safari 底部空白
    ========================= */
    .footer-nav {
      position: absolute;
      width: 440px;
      height: 120px;
      left: 0;
      top: 836px;
      background: rgba(53, 53, 53, 0.2);
      box-shadow: none;
    }

    /* =========================
       只有加入主畫面才套用 safe-area
    ========================= */
    
    }

  </style>
</head>
<body>

<div class="scale-wrapper">
  <div class="app">
    <div class="header"></div>
    <div class="rect13"></div>
    <div class="rect2"></div>
    <div class="rect4"></div>
    <div class="rect14"></div>
    <div class="footer-nav"></div>
  </div>
</div>

</body>
</html>
