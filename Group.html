<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #212121;
            overflow: hidden;
        }

        .frame {
            width: 100vw;
            height: 100vh;
            max-width: 440px;
            max-height: 956px;
            background-color: #212121;
            margin: 0 auto;
            position: relative;
            
            /* 確保框架本身也是頂天立地 */
            top: 0;
        }

        /* Rectangle 1 */
        .rectangle-1 {
            position: absolute;
            width: 440px;
            height: 145px;
            left: 0px;
            
            /* 強制置頂，無視任何預留空間 */
            top: 0px; 

            background: rgba(53, 53, 53, 0.2);
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
            
            /* 如果你發現還是有微小差距，可以強制設定負值補償（通常不建議，除非特殊需求） */
            /* margin-top: -env(safe-area-inset-top); */
        }
    </style>
</head>
<body>

    <div class="frame">
        <div class="rectangle-1"></div>
    </div>

</body>
</html>
