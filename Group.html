<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#212121">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #212121;
            position: fixed; 
            overflow: hidden;
        }

        .frame {
            width: 100%;
            height: 100%;
            background-color: #212121;
            position: relative;
        }

        /* --- 原有元件 --- */

        .rectangle-1 {
            position: absolute;
            width: 440px; 
            height: 145px;
            left: 50%;
            transform: translateX(-50%);
            top: 0px;
            background: rgba(53, 53, 53, 0.2);
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
            z-index: 1;
        }

        .s-3588120-1 {
            position: absolute;
            width: 60px;
            height: 60px;
            left: 50%;
            transform: translateX(-50%);
            top: 60px;
            background: url('https://raw.githubusercontent.com/liug1217/Group/682c1e79d519a3ce8ea245a2b0f9120ddce9fe28/S__3588120.jpg');
            background-size: cover;
            background-position: center;
            filter: drop-shadow(0px 4px 4px rgba(0, 0, 0, 0.25));
            border-radius: 30px;
            z-index: 2;
        }

        .rectangle-13 {
            position: absolute;
            width: 400px;
            height: 150px;
            left: 50%;
            transform: translateX(-50%);
            top: 165px;
            background: rgba(65, 65, 65, 0.2);
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
            border-radius: 35px;
            z-index: 2;
        }

        /* --- 新加入元件 --- */

        /* Rectangle 2 - 主容器 */
        .rectangle-2 {
            position: absolute;
            width: 400px;
            height: 406px;
            left: 50%;
            transform: translateX(-50%);
            top: 340px;
            background: rgba(65, 65, 65, 0.2);
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
            border-radius: 35px;
            z-index: 2;
        }

        /* Rectangle 4 - 容器頂部標籤 */
        .rectangle-4 {
            box-sizing: border-box;
            position: absolute;
            width: 400px;
            height: 50px;
            left: 50%;
            transform: translateX(-50%);
            top: 340px; /* 與 Rectangle 2 頂部重合 */
            background: rgba(53, 53, 53, 0.2);
            border-bottom: 1px solid #838383;
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
            border-radius: 35px 35px 0px 0px;
            z-index: 3; /* 確保在容器之上 */
        }

        /* Rectangle 12 - 底部導覽列背景 */
        .rectangle-12 {
            position: absolute;
            width: 440px;
            height: 120px;
            left: 50%;
            transform: translateX(-50%);
            top: 836px;
            background: rgba(53, 53, 53, 0.2);
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="frame">
        <div class="rectangle-1"></div>
        <div class="s-3588120-1"></div>
        <div class="rectangle-13"></div>
        
        <div class="rectangle-2"></div>
        <div class="rectangle-4"></div>
        <div class="rectangle-12"></div>
    </div>

</body>
</html>
