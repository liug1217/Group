<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #212121;
            overflow: hidden;
        }

        .frame {
            width: 100vw;
            height: 100vh;
            max-width: 440px;
            max-height: 956px;
            background-color: #212121;
            margin: 0 auto;
            position: relative;
        }

        /* Rectangle 1 */
        .rectangle-1 {
            position: absolute;
            width: 440px;
            height: 145px;
            left: 0px;
            /* 強制貼齊最頂端，無視安全區域 */
            top: 0px; 

            background: rgba(53, 53, 53, 0.2);
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
            
            /* 如果你發現內容被時間擋住，才需要用 padding 撐開，
               但既然你要物件往上移，這裡我們保持 0 */
            padding-top: 0;
        }
    </style>
</head>
<body>

    <div class="frame">
        <div class="rectangle-1"></div>
    </div>

</body>
</html>
