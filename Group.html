<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #212121;
            overflow: hidden;
        }

        .frame {
            width: 100vw;
            height: 100vh;
            max-width: 440px;
            max-height: 956px;
            background-color: #212121;
            margin: 0 auto;
            position: relative; /* 確保內部的 absolute 定位以這層為基準 */
        }

        /* Rectangle 1 */
        .rectangle-1 {
            position: absolute;
            width: 440px;
            height: 145px;
            left: 0px;
            top: 0px;

            background: rgba(53, 53, 53, 0.2);
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
        }
    </style>
</head>
<body>

    <div class="frame">
        <div class="rectangle-1"></div>
    </div>

</body>
</html>
