<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#212121" />

  <title>手機APP框架 - 完美全螢幕優化版</title>

  <style>
    /* =========================
       基礎布局（消滅空白的終極核心）
    ========================= */

    html {
      margin: 0;
      padding: 0;
      /* 關鍵：背景色必須與 App 一致，確保 Safari 網址列背景不留白 */
      background-color: #212121;
      height: 100svh;
      width: 100%;
      overflow: hidden;
      position: fixed; /* 防止橡皮筋回彈 */
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      height: 100svh;
      width: 100%;
      background-color: #212121;
      overscroll-behavior-y: none;
      overflow: hidden;
    }

    /* 主容器縮放邏輯：
       使用 100svh 計算縮放，確保在瀏覽器網址列出現時，App 會自動縮放以適配空間
    */
    .scale-wrapper {
      transform-origin: center;
      transform: scale(calc(min(100vw / 440, 100svh / 956)));
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      width: 440px;
      height: 956px;
      background: #212121;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* =========================
       Header（Rect 1）
       在 PWA 模式下自動避開瀏海
    ========================= */
    .header {
      position: absolute;
      width: 440px;
      height: 145px;
      left: 0;
      top: 0;
      background: rgba(53, 53, 53, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      z-index: 10;
    }

    /* 只有在主畫面模式時，才微調 Header 高度，防止內容被瀏海遮擋 */
    @media (display-mode: standalone) {
      .header {
        height: 165px; /* 增加 20px 空間 */
        padding-top: env(safe-area-inset-top);
      }
    }

    /* =========================
       UI 區塊（保留你提供的所有元件）
    ========================= */
    .rect13 {
      position: absolute;
      width: 400px;
      height: 150px;
      left: 20px;
      top: 165px;
      background: rgba(65, 65, 65, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 35px;
    }

    .rect2 {
      position: absolute;
      width: 400px;
      height: 406px;
      left: 20px;
      top: 340px;
      background: rgba(65, 65, 65, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 35px;
    }

    .rect4 {
      position: absolute;
      width: 400px;
      height: 50px;
      left: 20px;
      top: 340px;
      background: rgba(53, 53, 53, 0.2);
      border-bottom: 1px solid #838383;
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 35px 35px 0 0;
      box-sizing: border-box;
    }

    .rect14 {
      position: absolute;
      width: 150px;
      height: 76px;
      left: 260px;
      top: 219px;
      background: rgba(99, 99, 99, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 10px;
    }

    /* =========================
       Footer（Rect 12）
       修正重點：移除 env() 以避免瀏覽器模式下的雙重間距
    ========================= */
    .footer-nav {
      position: absolute;
      width: 440px;
      height: 120px;
      left: 0;
      top: 836px; /* 貼齊底部 */
      background: rgba(53, 53, 53, 0.2);
      box-shadow: none;
    }

    /* 只有在主畫面模式下才針對底部 Home 條進行補償 */
    @media (display-mode: standalone) {
      .footer-nav {
        height: calc(120px + env(safe-area-inset-bottom));
        padding-bottom: env(safe-area-inset-bottom);
      }
    }

  </style>
</head>
<body>

<div class="scale-wrapper">
  <div class="app">
    <div class="header"></div>
    <div class="rect13"></div>
    <div class="rect2"></div>
    <div class="rect4"></div>
    <div class="rect14"></div>
    <div class="footer-nav"></div>
  </div>
</div>

</body>
</html>
