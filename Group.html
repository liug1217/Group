<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>App 空白模板</title>
  <style>
    /* 1. 強制網頁填滿視窗，禁止捲動 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000; /* 外部背景設為黑色 */
      overflow: hidden;
      display: flex;
      justify-content: center; /* 水平置中 */
      align-items: flex-start; /* 從頂部對齊 */
    }

    /* 2. 這是你的核心畫布 (440x956) */
    #main-canvas {
      width: 440px;
      height: 956px;
      background: #212121; /* App 的主背景色 */
      position: relative;
      flex-shrink: 0;
      transform-origin: top center; /* 縮放支點設在頂部中間 */
      overflow: hidden;
    }

    /* 之後你塞入的任何物件樣式 */
    .sample-object {
      position: absolute;
      /* 只要使用 px 定位，縮放邏輯會幫你處理好一切 */
    }
  </style>
</head>
<body>

  <div id="main-canvas">
    
    </div>

  <script>
    /**
     * 自動縮放邏輯
     * 原理：計算「目前瀏覽器寬度」與「設計稿寬度(440)」的比例
     * 讓整張畫布按比例放大/縮小，達成全螢幕滿版效果
     */
    function rescale() {
      const canvas = document.getElementById('main-canvas');
      if (!canvas) return;
      
      const screenWidth = window.innerWidth;
      const scale = screenWidth / 440; // 計算縮放倍率
      
      canvas.style.transform = `scale(${scale})`;
    }

    // 初始化並監聽視窗縮放事件
    window.addEventListener('resize', rescale);
    rescale();
  </script>
</body>
</html>
