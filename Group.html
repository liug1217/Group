<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Group Ranking</title>
  <style>
    /* 基礎設定：確保背景與內容一致，消除黑邊感 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #212121; /* 與設計稿背景同色 */
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-x: hidden;
    }

    /* 核心縮放邏輯 */
    .frame {
      width: 440px;
      height: 956px;
      background: #212121;
      position: relative;
      box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
      flex-shrink: 0;
      
      /* 利用 scale 讓 440px 的設計自動縮放到符合手機螢幕寬度 (100vw) */
      transform: scale(calc(100vw / 440));
      transform-origin: top center;
    }

    /* 以下為你原始的 UI 樣式 */
    .avatar {
      position: absolute;
      width: 60px;
      height: 60px;
      left: 190px;
      top: 60px;
      background: url('https://raw.githubusercontent.com/liug1217/Group/a1153fe131cd163256e6991cb4015299acb7a5e8/S__3588120.jpg');
      background-size: cover;
      background-position: center;
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 30px;
    }

    .top-card {
      position: absolute;
      width: 440px;
      height: 145px;
      left: 0px;
      top: 0px;
      background: rgba(53,53,53,0.18);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      border-bottom: 1px solid rgba(255,255,255,0.28);
      box-shadow: 0px 20px 30px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.10);
    }

    .rect-13 {
      position: absolute;
      width: 400px;
      height: 150px;
      left: 20px;
      top: 165px;
      background: rgba(53,53,53,0.18);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow: 0px 20px 30px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.10);
      border-radius: 35px;
    }

    .rect-14 {
      position: absolute;
      width: 150px;
      height: 76px;
      left: 260px;
      top: 219px;
      background: rgba(53,53,53,0.18);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 10px;
    }

    .rect-2 {
      position: absolute;
      width: 400px;
      height: 406px;
      left: 20px;
      top: 340px;
      background: rgba(53,53,53,0.18);
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 35px;
      overflow: hidden;
    }

    .rect-4 {
      position: absolute;
      width: 400px;
      height: 50px;
      background: rgba(53,53,53,0.18);
      border-bottom: 1px solid #838383;
    }

    .rect-12 {
      position: absolute;
      width: 440px;
      height: 120px;
      left: 0px;
      top: 836px;
      background: rgba(53,53,53,0.18);
      backdrop-filter: blur(2px);
      border-top: 1px solid rgba(255,255,255,0.28);
    }

    /* 分隔線 */
    .rect-line {
      position: absolute;
      width: 400px;
      height: 1px;
      left: 20px;
      background: #838383;
    }

    /* 角色頭像清單樣式 */
    .av-item {
      position: absolute;
      width: 35px;
      height: 35px;
      left: 30px;
      background-size: cover;
      background-position: center;
      border-radius: 17.5px;
      box-shadow: 0px 4px 4px rgba(0,0,0,0.25);
    }

    /* 字體與顏色 */
    * {
      font-family: 'Inter', 'Heiti TC', sans-serif;
      color: #FFFFFF;
      text-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      white-space: nowrap;
    }

    .title-rank { position: absolute; left: 190px; top: 355px; font-size: 20px; }
    .title-player { position: absolute; left: 80px; top: 358px; font-size: 15px; }
    .title-score { position: absolute; left: 315px; top: 358px; font-size: 15px; }
    .group-title { position: absolute; width: 440px; text-align: center; top: 122px; font-size: 12px; }

    .big-avatar-2 {
      position: absolute;
      width: 100px;
      height: 100px;
      left: 30px;
      top: 190px;
      background: url('https://raw.githubusercontent.com/liug1217/Group/a1153fe131cd163256e6991cb4015299acb7a5e8/S__14131250.jpg');
      background-size: cover;
      border-radius: 50px;
      z-index: 20;
    }

    .u1_info { position: absolute; left: 150px; z-index: 20; }
    .u1_name { top: 202px; font-size: 12px; }
    .u1_id { top: 215px; font-size: 15px; }
    .u1_level_label { top: 233px; font-size: 12px; }
    .u1_level { top: 248px; font-size: 12px; }

    .player-text { position: absolute; left: 80px; }
    .p-name { font-size: 15px; }
    .p-level { font-size: 12px; margin-top: 18px; }

  </style>
</head>
<body>

    <div class="player-text" style="top:551px;">
      <div class="p-name">劉思妤 Bi_Robbyg309bbb</div>
      <div class="p-level">Roblox競爭者等級 : 128</div>
    </div>

    <div class="av-item" style="top:602px; background-image: url('https://raw.githubusercontent.com/liug1217/Group/a1153fe131cd163256e6991cb4015299acb7a5e8/S__14131253.jpg');"></div>
    <div class="player-text" style="top:602px;">
      <div class="p-name">帆</div>
      <div class="p-level">Roblox競爭者等級 : </div>
    </div>
    
    <div class="av-item" style="top:654px; background-image: url('https://raw.githubusercontent.com/liug1217/Group/a1153fe131cd163256e6991cb4015299acb7a5e8/S__14131255.jpg');"></div>
    <div class="av-item" style="top:704px; background-image: url('https://raw.githubusercontent.com/liug1217/Group/a1153fe131cd163256e6991cb4015299acb7a5e8/S__14131240.jpg');"></div>
  </div>
</body>
</html>
