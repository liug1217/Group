<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=440, height=956, initial-scale=1.0" />
  <title>手機APP框架</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #212121;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .app {
      width: 440px;
      height: 956px;
      background: #212121;
      position: relative;
      overflow: hidden;
    }

    /* Rectangle 1 */
    .rect1 {
      position: absolute;
      width: 440px;
      height: 145px;
      left: 0px;
      top: 0px;
      background: rgba(53, 53, 53, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
    }

    /* Rectangle 13 */
    .rect13 {
      position: absolute;
      width: 400px;
      height: 150px;
      left: 20px;
      top: 165px;
      background: rgba(65, 65, 65, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 35px;
    }

    /* Rectangle 2 */
    .rect2 {
      position: absolute;
      width: 400px;
      height: 406px;
      left: 20px;
      top: 340px;
      background: rgba(65, 65, 65, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 35px;
    }

    /* Rectangle 4 */
    .rect4 {
      position: absolute;
      width: 400px;
      height: 50px;
      left: 20px;
      top: 340px;
      box-sizing: border-box;
      background: rgba(53, 53, 53, 0.2);
      border-bottom: 1px solid #838383;
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 35px 35px 0px 0px;
    }

    /* Rectangle 12 */
    .rect12 {
      position: absolute;
      width: 440px;
      height: 120px;
      left: 0px;
      top: 836px;
      background: rgba(53, 53, 53, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
    }

    /* Rectangle 14 */
    .rect14 {
      position: absolute;
      width: 150px;
      height: 76px;
      left: 260px;
      top: 219px;
      background: rgba(99, 99, 99, 0.2);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 10px;
    }

  </style>
</head>
<body>

<div class="app">
  <div class="rect1"></div>
  <div class="rect13"></div>
  <div class="rect2"></div>
  <div class="rect4"></div>
  <div class="rect12"></div>
  <div class="rect14"></div>
</div>

</body>
</html>
