<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#212121">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #212121;
            /* 防止頁面上下拉動導致露底色 */
            position: fixed; 
            overflow: hidden;
        }

        .frame {
            /* 3. 在手機上填滿 100%，在電腦上維持比例 */
            width: 100vw;
            height: 100vh;
            max-width: 440px; /* 如果在電腦看，依然維持你想要的寬度 */
            max-height: 956px;
            background-color: #212121;
            margin: 0 auto;
            position: relative;
        }

        /* Rectangle 1 */
        .rectangle-1 {
            position: absolute;
            width: 100%; 
            /* 4. 這裡的高度你可以維持 145px，
               但建議加上 padding-top 確保內容不被狀態列（時間/電量）完全遮住文字 */
            height: 145px;
            left: 0px;
            top: 0px;

            background: rgba(53, 53, 53, 0.4); /* 稍微加深透明度，層次感更好 */
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
            
            /* 5. 這一行確保你的半透明矩形從螢幕最頂端（含瀏海區）開始繪製 */
            display: flex;
            align-items: flex-start;
        }
    </style>
</head>
<body>

    <div class="frame">
        <div class="rectangle-1"></div>
    </div>

</body>
</html>
