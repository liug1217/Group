<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #212121;
            overflow: hidden;
        }

        .frame {
            width: 100vw;
            height: 100vh;
            /* 移除 max-height 限制，讓它在手機上完全填滿 */
            max-width: 440px; 
            background-color: #212121;
            margin: 0 auto;
            position: relative;
        }

        /* Rectangle 1 */
        .rectangle-1 {
            position: absolute;
            width: 100%;
            height: 145px;
            left: 0px;
            
            /* 強制往上頂，忽略安全區造成的空白 */
            top: 0px; 

            background: rgba(53, 53, 53, 0.2);
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);

            /* 如果你想讓內容避開時間與電量，但背景色依舊填滿，可以使用下方屬性：
               padding-top: env(safe-area-inset-top); 
            */
        }
    </style>
</head>
<body>

    <div class="frame">
        <div class="rectangle-1"></div>
    </div>

</body>
</html>
