<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Frame</title>
    <style>
        /* 移除瀏覽器預設的邊距 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #212121; /* 底色直接設為你的目標顏色 */
            overflow: hidden; /* 防止出現捲軸 */
        }

        .frame {
            /* 針對開發環境，我們設定最大尺寸；但在手機上它會自動填滿 */
            width: 100vw; 
            height: 100vh;
            max-width: 440px;
            max-height: 956px;
            background-color: #212121;
            
            /* 如果在寬螢幕看，依然保持置中 */
            margin: 0 auto;
            position: relative;
        }
    </style>
</head>
<body>

    <div class="frame"></div>

</body>
</html>
