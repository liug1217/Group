<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Frame</title>
    <style>
        /* 基礎重置，確保全螢幕顯示 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; /* 外部設為黑色 */
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        /* 主框架：440x956, 顏色 #212121 */
        .app-frame {
            position: relative;
            width: 440px;
            height: 956px;
            background-color: #212121;
            overflow: hidden;
        }

        /* Rectangle 1 */
        .rectangle-1 {
            position: absolute;
            width: 440px;
            height: 145px;
            left: 0px;
            top: 0px;

            /* 20% 透明度的深灰色，會與背景 #212121 疊加 */
            background: rgba(53, 53, 53, 0.2);
            /* 陰影效果 */
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
            
            /* 讓內容可以在裡面置中（選用） */
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
        }

        /* 針對真實手機螢幕的適應 (選用) */
        @media (max-width: 440px) {
            .app-frame, .rectangle-1 {
                width: 100vw;
            }
        }
    </style>
</head>
<body>

    <div class="app-frame">
        <div class="rectangle-1">
            </div>
    </div>

</body>
</html>
