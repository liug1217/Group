<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#212121">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #212121;
            position: fixed; 
            overflow: hidden;
        }

        .frame {
            width: 100vw;
            height: 100vh;
            max-width: 440px;
            max-height: 956px;
            background-color: #212121;
            margin: 0 auto;
            position: relative;
        }

        /* Rectangle 1 - 頂部半透明遮罩 */
        .rectangle-1 {
            position: absolute;
            width: 100%; 
            /* 高度改為動態，確保包含安全區 */
            height: calc(145px + env(safe-area-inset-top)); 
            left: 0px;
            top: 0px;
            background: rgba(53, 53, 53, 0.2);
            box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
            z-index: 1;
        }

        /* S__3588120 1 - 大頭貼圖片 */
        .avatar-img {
            position: absolute;
            width: 60px;
            height: 60px;
            /* 讓圖片水平居中 (440px 下的 190px) */
            left: 190px;
            /* 考慮安全區的動態位置 */
            top: calc(60px + env(safe-area-inset-top));

            /* 圖片路徑已更換為原始檔案連結 */
            background: url('https://raw.githubusercontent.com/liug1217/Group/682c1e79d519a3ce8ea245a2b0f9120ddce9fe28/S__3588120.jpg');
            background-size: cover;
            background-position: center;
            
            filter: drop-shadow(0px 4px 4px rgba(0, 0, 0, 0.25));
            border-radius: 30px;
            z-index: 2; /* 確保在遮罩上方 */
        }
    </style>
</head>
<body>

    <div class="frame">
        <div class="rectangle-1"></div>
        <div class="avatar-img"></div>
    </div>

</body>
</html>
