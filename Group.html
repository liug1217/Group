<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Full Screen Edge to Edge</title>
  <style>
    /* 1. 徹底清除所有邊距，確保框架能衝到最頂端 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #212121; /* 背景色設為與 App 一致，消除色差 */
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start; /* 從絕對頂部開始 */
    }

    /* 2. 核心畫布：直接貼頂 */
    #main-canvas {
      width: 440px;
      height: 956px;
      background: #212121;
      position: relative;
      flex-shrink: 0;
      transform-origin: top center;
      
      /* 刪除 margin-top，讓框架往上衝到螢幕邊緣 */
      margin-top: 0 !important; 
      overflow: hidden;
    }

    /* 如果你需要內容避開瀏海，就在內部物件加偏移，但框架本身已經到頂了 */
  </style>
</head>
<body>

  <div id="main-canvas">
    <div style="position: absolute; width: 100%; height: 50px; background: red; top: 0; left: 0; color: white; text-align: center; line-height: 50px;">
      這塊紅色會被瀏海擋住，代表框架已成功到頂
    </div>
  </div>

  <script>
    function rescale() {
      const canvas = document.getElementById('main-canvas');
      if (!canvas) return;
      
      // 放大倍率邏輯保持不變
      const scale = window.innerWidth / 440;
      canvas.style.transform = `scale(${scale})`;
    }

    window.addEventListener('resize', rescale);
    rescale();
  </script>
</body>
</html>
