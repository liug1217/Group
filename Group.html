<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>登頂全螢幕框架</title>
    <style>
        /* 徹底重置瀏覽器預設值 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000; /* 外部背景黑色 */
            overflow: hidden;
            /* 鎖定 body 不讓它有任何滾動或回彈感 */
            position: fixed;
            top: 0;
            left: 0;
        }

        #main-canvas {
            width: 440px;
            height: 956px;
            background: #212121;
            position: absolute; /* 使用 absolute 配合 top: 0 登頂 */
            top: 0;
            left: 50%;
            transform-origin: top center;
            /* 初始置中，JS 會接手縮放 */
            transform: translateX(-50%); 
        }

        /* 測試物件：如果這個方塊被瀏海切到，代表成功登頂 */
        .test-top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: linear-gradient(to bottom, #ff0000, transparent);
            color: white;
            text-align: center;
            font-weight: bold;
            z-index: 999;
        }
    </style>
</head>
<body>

    <div id="main-canvas">
        <div class="test-top-bar">已強制登頂 (頂部 0px)</div>
        
        </div>

    <script>
        function rescale() {
            const canvas = document.getElementById('main-canvas');
            const screenWidth = window.innerWidth;
            
            // 計算縮放倍率
            const scale = screenWidth / 440;
            
            // 縮放並維持水平置中
            canvas.style.transform = `translateX(-50%) scale(${scale})`;
        }

        window.addEventListener('resize', rescale);
        window.addEventListener('orientationchange', rescale);
        rescale();
    </script>
</body>
</html>
