<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#212121" />

  <title>手機APP框架 - 完美全螢幕版</title>

  <style>
    /* =========================
       第一步：背景填充（消除空白的核心）
    ========================= */
    html {
      margin: 0;
      padding: 0;
      /* 關鍵：背景色必須與 App 一致，這樣安全區就不會是白的 */
      background-color: #212121; 
      height: 100%;
      width: 100%;
      overflow: hidden;
      /* 防止 iOS 橡皮筋回彈露出底色 */
      position: fixed; 
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      /* 使用 svh 確保縮放容器始終在網址列縮放後的正中央 */
      height: 100svh; 
      width: 100vw;
      background-color: #212121;
      overflow: hidden;
      overscroll-behavior: none;
    }

    /* =========================
       第二步：精確縮放容器
    ========================= */
    .scale-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      /* 這裡是為了確保內容始終保持比例並置中 */
    }

    .app {
      /* 你的原始畫布尺寸 */
      width: 440px;
      height: 956px;
      background: #212121;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      
      /* 縮放邏輯：自動計算寬高比，不依賴 env() */
      transform: scale(calc(min(100vw / 440, 100svh / 956)));
    }

    /* =========================
       第三步：組件樣式（移除所有內部 env 衝突）
    ========================= */
    .header {
      position: absolute;
      width: 440px;
      height: 145px;
      left: 0;
      top: 0;
      background: rgba(53, 53, 53, 0.4);
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      z-index: 10;
    }

    /* 針對 PWA 模式（加入主畫面）手動增加頂部間距，避開瀏海 */
    @media (display-mode: standalone) {
      .header {
        /* 在 PWA 模式下稍微向下推，模擬安全區空間 */
        height: 165px;
        padding-top: 20px;
      }
    }

    .footer-nav {
      position: absolute;
      width: 440px;
      height: 120px;
      left: 0;
      bottom: 0; /* 改用 bottom: 0 確保貼齊底部 */
      background: rgba(53, 53, 53, 0.4);
    }

    /* 內容區塊 */
    .rect13 {
      position: absolute;
      width: 400px;
      height: 150px;
      left: 20px;
      top: 175px;
      background: rgba(65, 65, 65, 0.2);
      border-radius: 35px;
    }

    .rect2 {
      position: absolute;
      width: 400px;
      height: 406px;
      left: 20px;
      top: 350px;
      background: rgba(65, 65, 65, 0.2);
      border-radius: 35px;
    }

    /* 提示視窗樣式 */
    #ios-prompt {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 15px;
      border-radius: 12px;
      z-index: 9999;
      display: none;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      font-family: sans-serif;
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="ios-prompt">
    點擊「分享」按鈕並選擇「加入主畫面」以獲得全螢幕體驗 🚀
  </div>

  <div class="scale-wrapper">
    <div class="app">
      <div class="header"></div>
      <div class="rect13"></div>
      <div class="rect2"></div>
      <div class="footer-nav"></div>
    </div>
  </div>

  <script>
    // 偵測是否為 iOS Safari 且尚未加入主畫面
    const isIos = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
    const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;

    if (isIos && !isStandalone) {
      document.getElementById('ios-prompt').style.display = 'block';
    }
  </script>
</body>
</html>
